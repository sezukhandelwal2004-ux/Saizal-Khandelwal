<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Gantt Chart</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #1c2330;
            --border: #21262d;
            --text: #e6edf3;
            --text-muted: #7d8590;
            --text-dim: #484f58;

            --c1: #3b82f6;
            --c1l: #1d4ed8;
            --c1bg: #1e3a5f22;
            --c2: #22c55e;
            --c2l: #15803d;
            --c2bg: #14532d22;
            --c3: #a855f7;
            --c3l: #7e22ce;
            --c3bg: #4c1d9522;
            --c4: #f97316;
            --c4l: #c2410c;
            --c4bg: #7c2d1222;
            --c5: #06b6d4;
            --c5l: #0e7490;
            --c5bg: #164e6322;
            --c6: #ec4899;
            --c6l: #be185d;
            --c6bg: #5b1e3422;
            --c7: #eab308;
            --c7l: #a16207;
            --c7bg: #4a360722;
            --c8: #64748b;
            --c8l: #334155;
            --c8bg: #1e293b22;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* === HEADER === */
        .header {
            padding: 40px 48px 32px;
            background: linear-gradient(180deg, #161b22 0%, transparent 100%);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            background: rgba(13, 17, 23, 0.85);
        }

        .header-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .project-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--c1);
            margin-bottom: 6px;
        }

        .project-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.1;
        }

        .project-dates {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 6px;
            font-family: 'DM Mono', monospace;
        }

        .stats {
            display: flex;
            gap: 24px;
        }

        .stat {
            text-align: right;
        }

        .stat-val {
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            line-height: 1;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* Progress bar */
        .progress-bar-wrap {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--c1), var(--c3));
            border-radius: 2px;
            transition: width 1s ease;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 11px;
            color: var(--text-dim);
        }

        /* === LEGEND === */
        .legend {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            background: var(--surface);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .legend-item:hover,
        .legend-item.active {
            color: var(--text);
            border-color: currentColor;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* === GANTT CONTAINER === */
        .gantt-container {
            overflow-x: auto;
            padding: 0 48px 80px;
            padding-top: 24px;
        }

        .gantt-inner {
            min-width: 1200px;
        }

        /* === TIMELINE HEADER === */
        .timeline-header {
            display: grid;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .tl-row {
            display: flex;
        }

        .tl-label-col {
            width: 320px;
            flex-shrink: 0;
        }

        .tl-bar-col {
            flex: 1;
        }

        .month-labels {
            display: flex;
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
            margin-bottom: 2px;
        }

        .month-label {
            flex: 1;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 8px 0 4px;
            text-align: left;
            padding-left: 4px;
            border-left: 1px solid var(--border);
        }

        .week-labels {
            display: flex;
        }

        .week-label {
            flex: 1;
            font-size: 9px;
            color: var(--text-dim);
            font-family: 'DM Mono', monospace;
            padding: 2px 0;
            text-align: center;
            border-left: 1px solid var(--border);
        }

        /* === PHASE GROUP === */
        .phase-group {
            margin-bottom: 4px;
        }

        /* === TASK ROW === */
        .task-row {
            display: flex;
            align-items: center;
            height: 36px;
            border-radius: 8px;
            margin-bottom: 2px;
            transition: background 0.15s;
            cursor: pointer;
            position: relative;
        }

        .task-row:hover {
            background: var(--surface);
        }

        .task-row.phase-header {
            height: 40px;
            margin-top: 12px;
            margin-bottom: 0;
        }

        .task-info {
            width: 320px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-right: 16px;
            overflow: hidden;
        }

        .task-row.phase-header .task-info {
            padding-left: 0;
        }

        .task-row:not(.phase-header) .task-info {
            padding-left: 20px;
        }

        .phase-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
        }

        .task-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .task-row.phase-header .task-name {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .task-row:not(.phase-header) .task-name {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-muted);
        }

        .task-dur {
            font-size: 10px;
            font-family: 'DM Mono', monospace;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        /* === GANTT BARS AREA === */
        .task-bars {
            flex: 1;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
        }

        .grid-lines {
            position: absolute;
            inset: 0;
            display: flex;
            pointer-events: none;
        }

        .grid-line {
            flex: 1;
            border-left: 1px solid var(--border);
            opacity: 0.4;
        }

        .today-line {
            position: absolute;
            top: -6px;
            bottom: -6px;
            width: 2px;
            background: var(--c6);
            z-index: 5;
            border-radius: 1px;
            opacity: 0.8;
        }

        .today-line::after {
            content: 'TODAY';
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            font-weight: 700;
            font-family: 'DM Mono', monospace;
            color: var(--c6);
            letter-spacing: 0.1em;
            white-space: nowrap;
        }

        .bar {
            position: absolute;
            height: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: filter 0.15s, transform 0.15s;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .phase-header .bar {
            height: 10px;
            opacity: 0.35;
            border-radius: 3px;
        }

        .bar:hover {
            filter: brightness(1.25);
            transform: scaleY(1.15);
            z-index: 10;
        }

        .bar-inner {
            width: 100%;
            height: 100%;
            border-radius: inherit;
        }

        .bar-label {
            position: absolute;
            left: 8px;
            font-size: 9px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap;
            pointer-events: none;
            letter-spacing: 0.03em;
        }

        /* === TOOLTIP === */
        .tooltip {
            position: fixed;
            background: #1c2330;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            pointer-events: none;
            z-index: 999;
            min-width: 220px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.15s, transform 0.15s;
        }

        .tooltip.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .tt-phase {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .tt-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .tt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 11px;
        }

        .tt-key {
            color: var(--text-dim);
        }

        .tt-val {
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
        }

        .tt-resource {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
        }

        .tt-resource-label {
            color: var(--text-dim);
            font-size: 10px;
            margin-bottom: 3px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            height: 4px;
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        /* Animation */
        .bar {
            animation: fadeIn 0.5s ease both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scaleX(0.8);
            }

            to {
                opacity: 1;
                transform: scaleX(1);
            }
        }

        .task-row {
            animation: slideIn 0.4s ease both;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-12px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-top">
            <div>
                <div class="project-label">📋 Project Timeline</div>
                <div class="project-title">Project Implementation Gantt</div>
                <div class="project-dates">Feb 01, 2026 &nbsp;→&nbsp; Jun 30, 2026 &nbsp;·&nbsp; 150 days</div>
            </div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-val">25</div>
                    <div class="stat-label">Tasks</div>
                </div>
                <div class="stat">
                    <div class="stat-val">8</div>
                    <div class="stat-label">Phases</div>
                </div>
                <div class="stat">
                    <div class="stat-val">5</div>
                    <div class="stat-label">Months</div>
                </div>
            </div>
        </div>

        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="progress-label">
            <span>Project Start — Feb 1, 2026</span>
            <span id="progressText"></span>
            <span>Project End — Jun 30, 2026</span>
        </div>

        <div class="legend" id="legend"></div>
    </div>

    <div class="gantt-container">
        <div class="gantt-inner" id="ganttInner"></div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script>
        const tasks = [
            { wbs: "1.0", name: "Project Initiation", start: "2026-02-01", end: "2026-02-07", dur: 7, pred: "-", res: "Sponsor, PM", phase: 1 },
            { wbs: "1.1", name: "Business Case & Charter", start: "2026-02-01", end: "2026-02-04", dur: 4, pred: "-", res: "Sponsor +1", phase: 1 },
            { wbs: "1.2", name: "Stakeholder ID & Kickoff", start: "2026-02-05", end: "2026-02-07", dur: 3, pred: "1.1", res: "PM +2", phase: 1 },
            { wbs: "2.0", name: "Planning Phase", start: "2026-02-08", end: "2026-02-21", dur: 14, pred: "1", res: "PM, BA", phase: 2 },
            { wbs: "2.1", name: "Management & Risk Plans", start: "2026-02-08", end: "2026-02-15", dur: 8, pred: "1.2", res: "PM +1", phase: 2 },
            { wbs: "2.2", name: "Resource Allocation", start: "2026-02-16", end: "2026-02-21", dur: 6, pred: "2.1", res: "PM", phase: 2 },
            { wbs: "3.0", name: "Requirements & Design", start: "2026-02-22", end: "2026-03-21", dur: 28, pred: "2", res: "BA, Vendor", phase: 3 },
            { wbs: "3.1", name: "Business Process Mapping", start: "2026-02-22", end: "2026-03-05", dur: 12, pred: "2.2", res: "BA", phase: 3 },
            { wbs: "3.2", name: "Gap Analysis & Functional Specs", start: "2026-03-06", end: "2026-03-15", dur: 10, pred: "3.1", res: "BA, Vendor", phase: 3 },
            { wbs: "3.3", name: "Solution Architecture Sign-off", start: "2026-03-16", end: "2026-03-21", dur: 6, pred: "3.2", res: "Vendor, PM +1", phase: 3 },
            { wbs: "4.0", name: "System Build & Config", start: "2026-03-22", end: "2026-04-30", dur: 40, pred: "3", res: "IT, Vendor", phase: 4 },
            { wbs: "4.1", name: "SAP Module Configuration", start: "2026-03-22", end: "2026-04-15", dur: 25, pred: "3.3", res: "Vendor", phase: 4 },
            { wbs: "4.2", name: "Custom & Interface Dev", start: "2026-04-10", end: "2026-04-30", dur: 21, pred: "4.1", res: "IT Team", phase: 4 },
            { wbs: "5.0", name: "Data Migration", start: "2026-04-10", end: "2026-05-10", dur: 31, pred: "4.1", res: "IT, Vendor", phase: 5 },
            { wbs: "5.1", name: "Data Cleansing & Mapping", start: "2026-04-10", end: "2026-04-25", dur: 16, pred: "4.1", res: "IT Team", phase: 5 },
            { wbs: "5.2", name: "Migration Scripts & Validation", start: "2026-04-26", end: "2026-05-10", dur: 15, pred: "5.1", res: "Vendor", phase: 5 },
            { wbs: "6.0", name: "Testing Phase", start: "2026-05-01", end: "2026-06-05", dur: 36, pred: "4", res: "QA, End Users", phase: 6 },
            { wbs: "6.1", name: "SIT (Integration Testing)", start: "2026-05-01", end: "2026-05-20", dur: 20, pred: "4.2", res: "QA Lead +1", phase: 6 },
            { wbs: "6.2", name: "UAT (User Acceptance)", start: "2026-05-21", end: "2026-06-05", dur: 16, pred: "6.1", res: "End Users +1", phase: 6 },
            { wbs: "7.0", name: "Training", start: "2026-05-15", end: "2026-06-10", dur: 27, pred: "6.1", res: "CM Lead", phase: 7 },
            { wbs: "7.1", name: "Material Development", start: "2026-05-15", end: "2026-05-30", dur: 16, pred: "6.1", res: "BA, CM Lead", phase: 7 },
            { wbs: "7.2", name: "End User Training Sessions", start: "2026-05-31", end: "2026-06-10", dur: 11, pred: "7.1", res: "End Users", phase: 7 },
            { wbs: "8.0", name: "Go-Live & Support", start: "2026-06-15", end: "2026-06-30", dur: 16, pred: "7.2", res: "All Teams", phase: 8 },
            { wbs: "8.1", name: "Cutover & Go-Live Execution", start: "2026-06-15", end: "2026-06-16", dur: 2, pred: "7.2", res: "PM, IT", phase: 8 },
            { wbs: "8.2", name: "Hypercare & Stabilization", start: "2026-06-17", end: "2026-06-30", dur: 14, pred: "8.1", res: "Vendor, IT", phase: 8 },
        ];

        const phases = {
            1: { name: "Project Initiation", color: "#3b82f6", icon: "🚀" },
            2: { name: "Planning Phase", color: "#22c55e", icon: "📋" },
            3: { name: "Requirements & Design", color: "#a855f7", icon: "🔍" },
            4: { name: "System Build & Config", color: "#f97316", icon: "⚙️" },
            5: { name: "Data Migration", color: "#06b6d4", icon: "🗄️" },
            6: { name: "Testing Phase", color: "#ec4899", icon: "🧪" },
            7: { name: "Training", color: "#eab308", icon: "🎓" },
            8: { name: "Go-Live & Support", color: "#64748b", icon: "🏁" },
        };

        const PROJECT_START = new Date("2026-02-01");
        const PROJECT_END = new Date("2026-06-30");
        const TOTAL_DAYS = (PROJECT_END - PROJECT_START) / 86400000 + 1;

        function dayOffset(d) {
            return (new Date(d) - PROJECT_START) / 86400000;
        }

        // Build week markers
        const weeks = [];
        let d = new Date(PROJECT_START);
        while (d <= PROJECT_END) {
            weeks.push(new Date(d));
            d.setDate(d.getDate() + 7);
        }

        // Build month groups for header
        const monthGroups = [];
        let curMonth = null, curStart = 0;
        weeks.forEach((w, i) => {
            const m = w.toLocaleString('default', { month: 'short', year: '2-digit' });
            if (m !== curMonth) {
                if (curMonth) monthGroups.push({ label: curMonth, start: curStart, end: i - 1 });
                curMonth = m;
                curStart = i;
            }
        });
        monthGroups.push({ label: curMonth, start: curStart, end: weeks.length - 1 });

        // Today
        const today = new Date("2026-03-01");
        const todayOffset = (today - PROJECT_START) / 86400000;
        const todayPct = Math.max(0, Math.min(100, todayOffset / TOTAL_DAYS * 100));

        // === LEGEND ===
        const legend = document.getElementById('legend');
        Object.entries(phases).forEach(([k, p]) => {
            const el = document.createElement('div');
            el.className = 'legend-item';
            el.innerHTML = `<span class="legend-dot" style="background:${p.color}"></span>${p.name}`;
            el.style.setProperty('--hover-color', p.color);
            el.addEventListener('mouseenter', () => el.style.borderColor = p.color);
            el.addEventListener('mouseleave', () => el.style.borderColor = '');
            legend.appendChild(el);
        });

        // === PROGRESS ===
        setTimeout(() => {
            document.getElementById('progressFill').style.width = todayPct + '%';
        }, 100);
        document.getElementById('progressText').textContent = `Today: Mar 1, 2026 (${Math.round(todayPct)}%)`;

        // === BUILD GANTT ===
        const container = document.getElementById('ganttInner');

        // Timeline header
        const headerDiv = document.createElement('div');
        headerDiv.innerHTML = `
  <div style="display:flex; margin-bottom:2px; position:sticky; top:0; z-index:40; background:var(--bg);">
    <div style="width:320px; flex-shrink:0;"></div>
    <div style="flex:1; position:relative;">
      <div class="month-labels">
        ${monthGroups.map(mg => {
            const pct = (mg.end - mg.start + 1) / weeks.length * 100;
            return `<div class="month-label" style="flex:${mg.end - mg.start + 1}">${mg.label}</div>`;
        }).join('')}
      </div>
      <div class="week-labels">
        ${weeks.map(w => `<div class="week-label">${w.getMonth() + 1}/${w.getDate()}</div>`).join('')}
      </div>
    </div>
  </div>
`;
        container.appendChild(headerDiv);

        // Tooltip
        const tooltip = document.getElementById('tooltip');

        function showTooltip(e, task) {
            const phase = phases[task.phase];
            tooltip.innerHTML = `
    <div class="tt-phase" style="color:${phase.color}">${phase.icon} ${phase.name}</div>
    <div class="tt-title">${task.name}</div>
    <div class="tt-row"><span class="tt-key">Start</span><span class="tt-val">${task.start}</span></div>
    <div class="tt-row"><span class="tt-key">End</span><span class="tt-val">${task.end}</span></div>
    <div class="tt-row"><span class="tt-key">Duration</span><span class="tt-val">${task.dur} days</span></div>
    ${task.pred && task.pred !== '-' ? `<div class="tt-row"><span class="tt-key">Predecessor</span><span class="tt-val">${task.pred}</span></div>` : ''}
    <div class="tt-resource">
      <div class="tt-resource-label">Resources</div>
      ${task.res}
    </div>
  `;
            tooltip.classList.add('visible');
            moveTooltip(e);
        }

        function moveTooltip(e) {
            const x = e.clientX + 16;
            const y = e.clientY - 10;
            const w = tooltip.offsetWidth;
            const h = tooltip.offsetHeight;
            tooltip.style.left = (x + w > window.innerWidth ? x - w - 32 : x) + 'px';
            tooltip.style.top = (y + h > window.innerHeight ? y - h + 20 : y) + 'px';
        }

        function hideTooltip() {
            tooltip.classList.remove('visible');
        }

        // Rows
        tasks.forEach((task, idx) => {
            const isPhase = parseFloat(task.wbs) === Math.floor(parseFloat(task.wbs));
            const phase = phases[task.phase];

            const row = document.createElement('div');
            row.className = 'task-row' + (isPhase ? ' phase-header' : '');
            row.style.animationDelay = (idx * 30) + 'ms';

            // Left info
            const info = document.createElement('div');
            info.className = 'task-info';
            if (isPhase) {
                info.innerHTML = `
      <div class="phase-icon" style="background:${phase.color}22; color:${phase.color}">${phase.icon}</div>
      <span class="task-name" style="color:${phase.color}">${task.name}</span>
      <span class="task-dur">${task.dur}d</span>
    `;
            } else {
                info.innerHTML = `
      <span class="task-name">${task.name}</span>
      <span class="task-dur">${task.dur}d</span>
    `;
            }

            // Bar area
            const barsDiv = document.createElement('div');
            barsDiv.className = 'task-bars';
            barsDiv.style.position = 'relative';

            // Grid lines
            const gridLines = document.createElement('div');
            gridLines.className = 'grid-lines';
            gridLines.innerHTML = weeks.map(() => '<div class="grid-line"></div>').join('');
            barsDiv.appendChild(gridLines);

            // Today line (on first row only)
            if (idx === 0) {
                const todayLine = document.createElement('div');
                todayLine.className = 'today-line';
                todayLine.style.left = todayPct + '%';
                barsDiv.appendChild(todayLine);
            }

            // Bar
            const startPct = dayOffset(task.start) / TOTAL_DAYS * 100;
            const widthPct = (task.dur) / TOTAL_DAYS * 100;

            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.left = startPct + '%';
            bar.style.width = Math.max(widthPct, 0.5) + '%';
            bar.style.animationDelay = (idx * 30 + 100) + 'ms';

            if (isPhase) {
                bar.style.background = phase.color;
                bar.style.opacity = '0.3';
                bar.style.height = '10px';
            } else {
                bar.style.background = `linear-gradient(90deg, ${phase.color}dd, ${phase.color}99)`;
                bar.style.boxShadow = `0 0 12px ${phase.color}44`;
            }

            bar.addEventListener('mouseenter', e => showTooltip(e, task));
            bar.addEventListener('mousemove', moveTooltip);
            bar.addEventListener('mouseleave', hideTooltip);
            row.addEventListener('mouseenter', e => showTooltip(e, task));
            row.addEventListener('mousemove', moveTooltip);
            row.addEventListener('mouseleave', hideTooltip);

            // Milestone dot for 1-2 day tasks
            if (task.dur <= 2 && !isPhase) {
                bar.style.width = '12px';
                bar.style.height = '12px';
                bar.style.borderRadius = '50%';
            }

            barsDiv.appendChild(bar);
            row.appendChild(info);
            row.appendChild(barsDiv);
            container.appendChild(row);

            // Separator line after phase headers
            if (isPhase) {
                row.style.borderBottom = `1px solid ${phase.color}22`;
                row.style.paddingBottom = '4px';
                row.style.marginBottom = '4px';
            }
        });
    </script>
</body>

</html>
